name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: Agent (Node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -F @pr-agent/agent typecheck

      - name: Build
        run: pnpm -F @pr-agent/agent build

      - name: Test
        run: pnpm -F @pr-agent/agent test

      - name: Upload agent dist
        uses: actions/upload-artifact@v4
        with:
          name: agent-dist
          path: |
            agent/dist
            agent/package.json

  cli:
    name: CLI (windows-latest)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Bootstrap vcpkg
        shell: pwsh
        env:
          VCPKG_COMMIT: ce613c41372b23b1f51333815feb3edd87ef8a8b
        run: |
          git clone https://github.com/microsoft/vcpkg.git $env:GITHUB_WORKSPACE\vcpkg
          git -C $env:GITHUB_WORKSPACE\vcpkg checkout $env:VCPKG_COMMIT
          & $env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" >> $env:GITHUB_ENV

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('cli/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure
        shell: pwsh
        working-directory: cli
        run: cmake --preset windows-x64

      - name: Build
        shell: pwsh
        working-directory: cli
        run: cmake --build --preset windows-x64 --config Release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-windows-x64
          path: cli/build/windows-x64/pr-review.exe

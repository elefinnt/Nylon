name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: Agent (Node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -F @nylon/agent typecheck

      - name: Build
        run: pnpm -F @nylon/agent build

      - name: Test
        run: pnpm -F @nylon/agent test

      - name: Upload agent dist
        uses: actions/upload-artifact@v4
        with:
          name: agent-dist
          path: |
            agent/dist
            agent/package.json

  cli:
    name: CLI (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Export GitHub Actions cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ce613c41372b23b1f51333815feb3edd87ef8a8b
          vcpkgJsonGlob: cli/vcpkg.json

      - name: Configure
        shell: pwsh
        working-directory: cli
        run: cmake --preset windows-x64

      - name: Build
        shell: pwsh
        working-directory: cli
        run: cmake --build --preset windows-x64 --config Release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nylon-windows-x64
          path: cli/build/windows-x64/nylon.exe

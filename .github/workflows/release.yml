name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows release
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install agent dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agent
        run: pnpm -F @pr-agent/agent build

      - name: Prepare agent production node_modules
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-staging\pr-agent\agent | Out-Null
          Copy-Item -Recurse agent\dist     release-staging\pr-agent\agent\dist
          Copy-Item        agent\package.json release-staging\pr-agent\agent\package.json
          Push-Location release-staging\pr-agent\agent
          pnpm install --prod --frozen-lockfile=false --ignore-workspace
          Pop-Location

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git $env:GITHUB_WORKSPACE\vcpkg
          & $env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" >> $env:GITHUB_ENV

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('cli/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure CLI
        shell: pwsh
        working-directory: cli
        run: cmake --preset windows-x64

      - name: Build CLI
        shell: pwsh
        working-directory: cli
        run: cmake --build --preset windows-x64 --config Release

      - name: Stage installer payload
        shell: pwsh
        run: |
          Copy-Item cli\build\windows-x64\pr-review.exe release-staging\pr-agent\pr-review.exe
          New-Item -ItemType Directory -Force -Path release-staging\pr-agent\installer | Out-Null
          Copy-Item installer\install.ps1 release-staging\pr-agent\installer\install.ps1
          Copy-Item README.md   release-staging\pr-agent\README.md
          Copy-Item LICENSE     release-staging\pr-agent\LICENSE
          Copy-Item -Recurse docs release-staging\pr-agent\docs

      - name: Package zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "pr-agent-$version-windows-x64.zip"
          Compress-Archive -Path release-staging\pr-agent\* -DestinationPath $zipName -Force
          echo "RELEASE_ZIP=$zipName" >> $env:GITHUB_ENV

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ env.RELEASE_ZIP }}
          generate_release_notes: true
